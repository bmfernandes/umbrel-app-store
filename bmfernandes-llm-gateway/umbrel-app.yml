# Manifesto Umbrel Community App do LLM Gateway (TASK_V21/V23). Só metadados públicos aqui —
# código-fonte segue privado (repo llm-gateway); imagem publicada num registry Docker privado
# no próprio Beelink, referenciada por loopback (TASK_V26 — não mais GHCR).
manifestVersion: 1
id: bmfernandes-llm-gateway
name: LLM Gateway
tagline: Inference-broker do homelab — gateway de texto OpenAI-compatible
icon: https://raw.githubusercontent.com/bmfernandes/umbrel-app-store/main/bmfernandes-llm-gateway/icon.svg
category: Developer Tools
# Casa com a versão do projeto (SemVer). Atualizar a cada release empacotado.
version: "0.9.9"
# Porta pública que o app_proxy escuta no host (faixa 80xx = app com UI, convenção AGENTS.md).
# O gateway-API interno segue em 8800 (88xx infra); o app_proxy faz proxy 8004 -> web:8800.
# AJUSTAR se colidir com outro app no Beelink (decisão empírica no deploy).
port: 8004
# A UI abre direto no dashboard admin read-only (co-servido pelo gateway, não é processo à parte).
path: "/dashboard"
description: >-
  Gateway de inferência de texto do homelab, compatível com a API OpenAI. Roteia por uma
  escada de tiers de qualidade que só desce (Groq em produção, Ollama como piso; Gemini,
  GPT-OSS e Claude como premium opt-in via pontes host-side). Inclui um dashboard de status
  admin read-only (saúde por tier, métricas e últimas requisições) e log de requisições
  durável para análise de uso. Os provedores reais ficam ocultos da API cliente (model:"gateway").
developer: BMFERNANDES
website: https://github.com/bmfernandes/llm-gateway
submitter: BMFERNANDES
repo: https://github.com/bmfernandes/llm-gateway
support: https://github.com/bmfernandes/llm-gateway/issues
gallery: []
releaseNotes: >-
  v0.9.9 — número da versão do app aparece ao lado do nome no dashboard; gráfico de
  latência das últimas requisições (mínimo/média/máximo) acima do painel de tiers;
  script `bridge/test-tiers.sh` para testar os 6 tiers manualmente. Infra: linger
  reabilitado para o usuário do Beelink (pontes agy/Claude caíam junto ao fim de toda
  sessão SSH) e OLLAMA_KEEP_ALIVE=24h no Ollama do ubuntu-server (evita recarregar o
  modelo do zero a cada janela ociosa). v0.9.8 — corrige resolução de hostname Tailscale de dentro do container (DNS explícito),
  destravando o tier low de vez; rótulo "Groq" no dashboard vira "Groq (via api)". v0.9.7 —
  OLLAMA_URL vira campo configurável no /setup (tier low finalmente funciona em
  produção — antes ficava preso num placeholder fixo). v0.9.6 — tela de segredos do /setup
  pré-preenche o que já está salvo (chaves/tokens
  mascarados, últimos 4 caracteres reais) com ícone de status por campo. v0.9.5 — login do
  /setup passa a ser formulário próprio, não mais o diálogo do navegador
  (Basic Auth) — corrige falha real de autenticação com senha contendo acento/caractere
  especial. v0.9.4 — /setup vira dois passos: primeiro cria só a conta de administrador, depois (já
  autenticado) abre a tela de segredos. v0.9.3 — botão "Setup" na navegação do dashboard, ao lado de "Dashboard"/"JSON": antes o único
  jeito de chegar em /setup era digitar a URL manualmente. v0.9.2 — imagem passa a ser publicada
  num registry Docker privado no próprio Beelink em vez do GHCR (TASK_V26): o botão "Update" volta
  a funcionar sozinho, sem 401 nem recriação manual de container. Corrige também a hora exibida no
  dashboard (formatada no navegador de quem vê a tela, não mais no timezone do container). v0.9.0
  — setup wizard de segredos (tela
  "/setup" no próprio app): configure GATEWAY_SECRETS/GROQ_API_KEY/tokens de ponte direto pela
  UI no 1º acesso, sem precisar de variáveis de ambiente. 1º acesso cria a conta de
  administrador; acessos seguintes exigem usuário/senha.
# Sem dependências de outros apps Umbrel: Ollama (server) e as pontes agy/claude são host-side,
# alcançados por Tailscale / host.docker.internal — não são apps do Umbrel.
dependencies: []
defaultUsername: ""
defaultPassword: ""
