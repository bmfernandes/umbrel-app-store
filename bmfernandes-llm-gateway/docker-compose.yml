# docker-compose do app Umbrel (TASK_V21/V23). app_proxy do framework Umbrel + serviço `web`
# (o gateway) — o gateway NÃO publica porta no host; o app_proxy é a única superfície exposta.
version: "3.7"

services:
  # Proxy reverso do framework Umbrel: publica a `port:` do manifesto e repassa para o gateway.
  # É ele que faz o ícone do dashboard abrir. APP_HOST = <id-completo-do-app>_<service>_1.
  app_proxy:
    environment:
      APP_HOST: bmfernandes-llm-gateway_web_1
      APP_PORT: 8800
      # A API /v1 é consumida por máquinas (sem login de navegador) — desligar a auth do proxy
      # para não quebrar os clientes. A proteção de acesso vem da rede (Tailscale).
      PROXY_AUTH_ADD: "false"

  web:
    # Registry Docker privado no proprio Beelink (TASK_V26), nao mais GHCR. 127.0.0.1
    # (loopback) porque o pull acontece no MESMO host onde o registry roda — Docker trata
    # 127.0.0.0/8 como inseguro por padrao, sem exigir insecure-registries no daemon.json
    # do umbrelOS. Publicacao via /publicar-imagem, manual, apos CI verde + tag.
    image: 127.0.0.1:8801/llm-gateway:v0.9.7
    restart: on-failure
    stop_grace_period: 1m
    # host.docker.internal → host do Beelink, para alcançar as pontes host-side (antigravity 8802 / claude 8803).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # No arranjo TASK_V17 a GPU/mídia vive no ubuntu-server; o Beelink não arbitra GPU local.
      - ARBITER_ENABLED=false
      # Ollama do ubuntu-server via Tailscale (tier low) — configurado via /setup (mesmo
      # motivo dos segredos abaixo: sem default fixo aqui, senão o fallback do arquivo
      # persistido nunca entraria em ação). Achado real (TASK_V26): um placeholder fixo
      # (`100.x.y.z`) nunca era substituível pelo fluxo normal do Umbrel — ficava travado
      # para sempre, e o tier `low` nunca funcionava de fato.
      - OLLAMA_URL=${OLLAMA_URL}
      # Pontes host-side no próprio Beelink (Gemini/GPT-OSS via agy; Claude).
      - ANTIGRAVITY_BRIDGE_URL=${ANTIGRAVITY_BRIDGE_URL:-http://host.docker.internal:8802}
      - CLAUDE_BRIDGE_URL=${CLAUDE_BRIDGE_URL:-http://host.docker.internal:8803}
      # Segredos: o instalador do Umbrel (Community App Store) NÃO tem formulário de env
      # vars (confirmado por leitura de código — `docker-pull.ts` do `umbreld` usa dockerode
      # puro, e o mecanismo nativo `exports.sh` depende de estado interno do processo
      # `umbreld`, não replicável para apps de terceiros — TASK_V23, Frente 4e). Ficam vazios
      # aqui de propósito: o gateway sobe mesmo assim e serve `/setup` (1º acesso cria a conta,
      # login por formulário próprio depois) para configurá-los, persistidos no volume
      # `/gateway/config` abaixo.
      # NUNCA hardcode valor real aqui.
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GATEWAY_SECRETS=${GATEWAY_SECRETS}
      - ANTIGRAVITY_BRIDGE_TOKEN=${ANTIGRAVITY_BRIDGE_TOKEN}
      - CLAUDE_BRIDGE_TOKEN=${CLAUDE_BRIDGE_TOKEN}
      - NTFY_TOPIC=${NTFY_TOPIC:-bmfernandes-llm-gateway}
      - USAGE_LOG_DIR=/gateway/usage
    volumes:
      # Log de portaria durável no storage do app (fora do container).
      - ${APP_DATA_DIR}/data/usage:/gateway/usage
      # Segredos configurados via /setup (TASK_V23, Frente 4e) — persistidos fora do
      # container, sobrevivem a updates/recriação.
      - ${APP_DATA_DIR}/data/config:/gateway/config
